<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خالة العيال - الصفحة الرئيسية</title>
    <link rel="stylesheet" href="home-style.css">
</head>

<body>
    <div class="container">
        <div class="logo-section">
            <img src="logo.png" alt="خالة العيال" class="logo">
        </div>

        <div class="cards-container">
            <div class="card" id="beKhalaCard">
                <div class="card-icon">👩‍🏫</div>
                <h2>كوني خالة</h2>
                <p>انضمي لفريقنا وكوني جزء من عيلة خالة العيال</p>
                <div class="card-arrow">←</div>
            </div>

            <div class="card" id="needKhalaCard">
                <div class="card-icon">👶</div>
                <h2>محتاجة خالة</h2>
                <p>احجزي خالة محترفة لرعاية أطفالك</p>
                <div class="card-arrow">←</div>
            </div>
        </div>
    </div>

    <script src="home-script.js"></script>
</body>

</html>
